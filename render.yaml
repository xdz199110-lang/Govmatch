# render.yaml — GovMatch API 完整基础设施定义

# -------------------------------------------------------
# 1. PostgreSQL 数据库
# -------------------------------------------------------
databases:
  - name: govmatch-db
    plan: free
    region: oregon
    databaseName: govmatch
    ipAllowList: []

# -------------------------------------------------------
# 2. Web Service — API 服务
# -------------------------------------------------------
services:
  - type: web
    name: govmatch-api
    plan: free
    region: oregon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: govmatch-db
          attribute: connectionString
      - key: LOG_LEVEL
        value: INFO

# -------------------------------------------------------
# 3. Cron Job — 定时拉取合同数据（每6小时）
#    注意：免费计划 Web Service 休眠后 Cron 可能无法触发
#    如需可靠运行，请升级到 Starter ($7/月) 或以上
# -------------------------------------------------------
crons:
  - name: fetch-contracts-cron
    plan: free
    schedule: "*/6 * * * *"
    command: python fetch_contracts.py
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: govmatch-db
          attribute: connectionString
