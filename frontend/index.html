<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GovMatch - Federal Contract Search</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>GovMatch</h1>
            <p class="subtitle">Federal Contract Search &amp; Win Rate Prediction</p>
        </header>

        <section class="search-bar">
            <input
                type="text"
                id="searchInput"
                placeholder="Enter company name, e.g. SAFEWARE..."
                autocomplete="off"
                spellcheck="false"
            />
            <button id="searchBtn">Search</button>
        </section>

        <div id="predictCard" class="predict-card hidden">
            <div class="predict-header">
                <span class="company-name" id="predictCompanyName"></span>
                <div class="win-rate" id="predictWinRate"></div>
            </div>
            <div class="predict-stats" id="predictStats"></div>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>

        <div id="resultsSection" class="results-section hidden">
            <div class="results-meta">
                <span id="resultsCount"></span>
            </div>
            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Award ID</th>
                            <th>Recipient Name</th>
                            <th>Amount ($)</th>
                            <th>Start Date</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="spinner"></div>
            <span>Loading...</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
